name: Tourism Project MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas huggingface-hub
          
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/data_registration.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn huggingface-hub matplotlib seaborn
          
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/data_preparation.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn huggingface-hub matplotlib seaborn mlflow
          
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 10
          
      - name: Model Building and Training
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: python tourism_project/model_building/model_training.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-training, data-prep, register-dataset]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub
          
      - name: Create Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          
          api = HfApi()
          try:
              api.create_repo(
                  repo_id='your-username/tourism-predictor',
                  repo_type='space',
                  space_sdk='streamlit',
                  exist_ok=True
              )
              print('✅ Space created successfully')
          except Exception as e:
              print(f'Space creation: {e}')
          "
          
      - name: Push files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: 
          python tourism_project/deployment
          
          # Upload app files
          python -c "
          from huggingface_hub import HfApi
          import os
          
          api = HfApi()
          files_to_upload = ['app.py', 'requirements.txt', 'Dockerfile']
          
          for file in files_to_upload:
              if os.path.exists(file):
                  try:
                      api.upload_file(
                          path_or_fileobj=file,
                          path_in_repo=file,
                          repo_id='your-username/tourism-predictor',
                          repo_type='space'
                      )
                      print(f'✅ Uploaded {file}')
                  except Exception as e:
                      print(f'❌ Error uploading {file}: {e}')
          
          # Create space README
          readme_content = '''
          ---
          title: Tourism Package Predictor
          emoji: 🏝️
          colorFrom: blue
          colorTo: green
          sdk: streamlit
          sdk_version: 1.28.1
          app_file: app.py
          pinned: false
          license: apache-2.0
          ---
          
          # Tourism Package Predictor
          
          A machine learning application that predicts whether a customer will purchase a Wellness Tourism Package.
          
          ## Features
          - Interactive web interface
          - Real-time predictions
          - Customer data input forms
          - Probability visualization
          
          ## How to Use
          1. Fill in customer information
          2. Click \"Make Prediction\"
          3. View results and probability scores
          '''
          
          with open('README.md', 'w') as f:
              f.write(readme_content)
          
          api.upload_file(
              path_or_fileobj='README.md',
              path_in_repo='README.md',
              repo_id='your-username/tourism-predictor',
              repo_type='space'
          )
          
          print('✅ All files uploaded to Hugging Face Space!')
          print('🚀 App URL: https://huggingface.co/spaces/your-username/tourism-predictor')
          "

  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-hosting]
    if: always()
    steps:
      - name: Cleanup
        run: |
          echo "🧹 Pipeline completed - cleaning up..."
          echo "✅ MLOps pipeline execution finished!"
