name: Tourism Project Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas huggingface-hub
      - name: Create data directory and file
        run: |
          mkdir -p tourism_project/data
          # If you don't have the tourism.csv file, create a placeholder or download it
          # echo "CustomerID,ProdTaken,Age" > tourism_project/data/tourism.csv
      - name: Create and run data registration script
        env:
          HF_TOKEN: ${{ secrets.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 }}
        run: |
          mkdir -p tourism_project/model_building
          cat > tourism_project/model_building/data_register.py << 'EOF'
          from huggingface_hub.utils import RepositoryNotFoundError, HfHubHTTPError
          from huggingface_hub import HfApi, create_repo
          import os
          
          repo_id = "dr-psych/tourism_project"
          repo_type = "dataset"
          api = HfApi(token=os.getenv("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"))
          
          try:
              api.repo_info(repo_id=repo_id, repo_type=repo_type)
              print(f"Repository '{repo_id}' already exists. Using it.")
          except RepositoryNotFoundError:
              print(f"Repository '{repo_id}' not found. Creating new repository...")
              create_repo(repo_id=repo_id, repo_type=repo_type, private=False)
              print(f"Repository '{repo_id}' created.")
          
          # Check if data directory exists before uploading
          import os
          if os.path.exists("tourism_project/data"):
              api.upload_folder(
                  folder_path="tourism_project/data",
                  repo_id=repo_id,
                  repo_type=repo_type,
              )
              print("Data uploaded successfully!")
          else:
              print("Data directory not found, skipping upload")
          EOF
          
          python tourism_project/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn huggingface-hub
      - name: Create and run data preparation script
        env:
          HF_TOKEN: ${{ secrets.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 }}
        run: |
          mkdir -p tourism_project/model_building
          cat > tourism_project/model_building/data_preparation.py << 'EOF'
          import pandas as pd
          import numpy as np
          from sklearn.preprocessing import LabelEncoder, StandardScaler
          from sklearn.model_selection import train_test_split
          import os
          
          print("Data preparation script executed successfully!")
          print("This is a placeholder - replace with actual data preparation logic")
          EOF
          
          python tourism_project/model_building/data_preparation.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn huggingface-hub matplotlib seaborn mlflow xgboost joblib
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 10
      - name: Create and run model training script
        env:
          HF_TOKEN: ${{ secrets.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 }}
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: |
          mkdir -p tourism_project/model_building
          cat > tourism_project/model_building/model_training.py << 'EOF'
          import pandas as pd
          import numpy as np
          import joblib
          import os
          
          print("Model training script executed successfully!")
          print("This is a placeholder - replace with actual model training logic")
          
          # Create a dummy model file for demonstration
          import sklearn.linear_model
          model = sklearn.linear_model.LogisticRegression()
          
          # Save model
          os.makedirs('models', exist_ok=True)
          joblib.dump(model, 'models/dummy_model.joblib')
          print("Dummy model created and saved")
          EOF
          
          python tourism_project/model_building/model_training.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-training, data-prep, register-dataset]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub streamlit
      - name: Create deployment files
        run: |
          mkdir -p tourism_project/deployment
          mkdir -p tourism_project/hosting
          
          # Create a simple streamlit app
          cat > tourism_project/deployment/app.py << 'EOF'
          import streamlit as st
          st.title("Tourism Package Prediction")
          st.write("Hello from the deployment!")
          EOF
          
          # Create requirements.txt
          cat > tourism_project/deployment/requirements.txt << 'EOF'
          streamlit==1.28.1
          pandas==2.0.3
          numpy==1.24.3
          scikit-learn==1.3.0
          huggingface-hub==0.17.3
          joblib==1.3.2
          EOF
          
          # Create hosting script
          cat > tourism_project/hosting/hosting.py << 'EOF'
          from huggingface_hub import HfApi, create_repo
          from huggingface_hub.utils import RepositoryNotFoundError
          import os
          
          api = HfApi(token=os.getenv("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"))
          repo_id = "dr-psych/tourism-predictor-app"
          
          try:
              api.repo_info(repo_id=repo_id, repo_type="space")
              print("Space already exists.")
          except RepositoryNotFoundError:
              print("Creating new space...")
              create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="streamlit",
                  private=False
              )
          
          api.upload_folder(
              folder_path="tourism_project/deployment",
              repo_id=repo_id,
              repo_type="space",
          )
          print("Deployment successful!")
          EOF
          
      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.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 }}
        run: |
          python tourism_project/hosting/hosting.py
